version: '3.8'

services:
  # ----------------------------------------
  # Base de Datos (MariaDB)
  # ----------------------------------------
  db:
    image: mariadb:10.11
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    volumes:
      - nextcloud_db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${NEXTCLOUD_DB_NAME}
      - MYSQL_USER=${NEXTCLOUD_DB_USER}
    networks:
      - backend

  # ----------------------------------------
  # Caché en Memoria (Redis) - Para Producción
  # ----------------------------------------
  redis:
    image: redis:alpine
    restart: always
    networks:
      - backend

  # ----------------------------------------
  # Aplicación Principal (Nextcloud)
  # ----------------------------------------
  app:
    image: nextcloud:latest
    restart: always
    volumes:
      - nextcloud_data:/var/www/html
      - ./nextcloud_core/apps/escardar_branding:/var/www/html/apps/escardar_branding
      - ./nextcloud_core/apps/escardar_mail:/var/www/html/apps/escardar_mail
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${NEXTCLOUD_DB_NAME}
      - MYSQL_USER=${NEXTCLOUD_DB_USER}
      - MYSQL_HOST=db
      - REDIS_HOST=redis
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${DOMAIN}
      # Las siguientes variables ayudan al Reverse Proxy (NPM) a funcionar bien
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://${DOMAIN}
      - OVERWRITEHOST=${DOMAIN}
    networks:
      - backend
      - proxy # Red compartida con Nginx Proxy Manager

  # ----------------------------------------
  # Tareas en Segundo Plano (Cron)
  # ----------------------------------------
  cron:
    image: nextcloud:latest
    restart: always
    volumes:
      - nextcloud_data:/var/www/html
    entrypoint: /cron.sh
    depends_on:
      - db
      - redis
    networks:
      - backend

  # ----------------------------------------
  # Servidor de Correo (Docker Mailserver)
  # ----------------------------------------
  mail:
    image: mailserver/docker-mailserver:latest
    restart: always
    hostname: mail
    domainname: ${DOMAIN}
    container_name: escardar_mail_server
    ports:
      - "25:25"
      - "143:143"
      - "587:587"
      - "993:993"
    volumes:
      - maildata:/var/mail
      - mailstate:/var/mail-state
      - mailconfig:/tmp/docker-mailserver
      - maillogs:/var/log/mail
      # Deberás montar los certificados generados por NPM aquí más adelante:
      # - /ruta/a/npm/letsencrypt/live/${DOMAIN}:/tmp/docker-mailserver/ssl:ro
    environment:
      - TZ=America/Bogota
      - HOSTNAME=mail
      - DOMAINNAME=${DOMAIN}
      - SSL_TYPE=letsencrypt # Preparado para Let's Encrypt
      - ENABLE_QUOTAS=1
      - ENABLE_MANAGESIEVE=1
      - ENABLE_SIEVE=1
      - SPOOFING_PROTECTION=relaxed
      - PERMIT_DOCKER=host
    networks:
      - backend
      - proxy
      
networks:
  backend:
  proxy:
    external: true
    # IMPORTANTE: Reemplaza 'npm_network' con el nombre real de la red de Docker
    # donde corre tu Nginx Proxy Manager (por ej: 'nginx-proxy-manager_default')
    name: npm_network

volumes:
  nextcloud_db:
  nextcloud_data:
  maildata:
  mailstate:
  mailconfig:
  maillogs:
