services:
  # ----------------------------------------
  # Base de Datos (MariaDB)
  # ----------------------------------------
  db:
    image: mariadb:10.11
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci
    volumes:
      - nextcloud_db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${NEXTCLOUD_DB_NAME}
      - MYSQL_USER=${NEXTCLOUD_DB_USER}
    networks:
      - backend

  # ----------------------------------------
  # Caché en Memoria (Redis)
  # ----------------------------------------
  redis:
    image: redis:alpine
    restart: always
    networks:
      - backend

  # ----------------------------------------
  # Aplicación Principal (Nextcloud)
  # NPM en .11 enruta HTTPS → este servidor:8090
  # ----------------------------------------
  app:
    image: nextcloud:latest
    restart: always
    ports:
      - "8090:80"
    volumes:
      - nextcloud_data:/var/www/html
      - ./nextcloud_core/apps/escardar_branding:/var/www/html/apps/escardar_branding
      - ./nextcloud_core/apps/escardar_mail:/var/www/html/apps/escardar_mail
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${NEXTCLOUD_DB_NAME}
      - MYSQL_USER=${NEXTCLOUD_DB_USER}
      - MYSQL_HOST=db
      - REDIS_HOST=redis
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}
      - NEXTCLOUD_TRUSTED_DOMAINS=${DOMAIN}
      - OVERWRITEPROTOCOL=https
      - OVERWRITECLIURL=https://${DOMAIN}
      - OVERWRITEHOST=${DOMAIN}
    depends_on:
      - db
      - redis
    networks:
      - backend

  # ----------------------------------------
  # Tareas en Segundo Plano (Cron)
  # ----------------------------------------
  cron:
    image: nextcloud:latest
    restart: always
    volumes:
      - nextcloud_data:/var/www/html
      - ./nextcloud_core/apps/escardar_branding:/var/www/html/apps/escardar_branding
      - ./nextcloud_core/apps/escardar_mail:/var/www/html/apps/escardar_mail
    entrypoint: /cron.sh
    depends_on:
      - db
      - redis
    networks:
      - backend

  # ----------------------------------------
  # Servidor de Correo (Docker Mailserver)
  # Los puertos SMTP/IMAP no pueden pasar por NPM (no son HTTP),
  # se exponen directamente desde este servidor.
  # SSL: montar certs de certbot local para mail.${DOMAIN}
  #   sudo certbot certonly --standalone -d mail.${DOMAIN}
  #   luego descomentar el volumen de letsencrypt abajo.
  # ----------------------------------------
  mail:
    image: mailserver/docker-mailserver:latest
    restart: always
    hostname: mail.${DOMAIN}
    container_name: escardar_mail_server
    ports:
      - "25:25"
      - "143:143"
      - "587:587"
      - "993:993"
    volumes:
      - maildata:/var/mail
      - mailstate:/var/mail-state
      - mailconfig:/tmp/docker-mailserver
      - maillogs:/var/log/mail
      # Descomentar cuando los certs estén generados en este servidor:
      # - /etc/letsencrypt:/etc/letsencrypt:ro
    environment:
      - TZ=America/Bogota
      - POSTFIX_MAILNAME=${DOMAIN}
      - ONE_DIR=1
      - SSL_TYPE=letsencrypt
      - ENABLE_QUOTAS=1
      - ENABLE_MANAGESIEVE=1
      - ENABLE_SIEVE=1
      - SPOOFING_PROTECTION=relaxed
      - PERMIT_DOCKER=connected-networks
    cap_add:
      - NET_ADMIN
      - SYS_PTRACE
    networks:
      backend:
        aliases:
          - mail.${DOMAIN}

networks:
  backend:
    driver: bridge

volumes:
  nextcloud_db:
  nextcloud_data:
  maildata:
  mailstate:
  mailconfig:
  maillogs:
