services:
  db:
    image: mariadb:10.11
    restart: always
    command: --transaction-isolation=READ-COMMITTED --binlog-format=ROW
    volumes:
      - nextcloud_db:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${NEXTCLOUD_DB_NAME}
      - MYSQL_USER=${NEXTCLOUD_DB_USER}

  app:
    image: nextcloud:latest
    restart: always
    ports:
      - 8080:80
    volumes:
      - nextcloud_data:/var/www/html
      - ./nextcloud_core/apps/escardar_branding:/var/www/html/apps/escardar_branding
      - ./nextcloud_core/apps/escardar_mail:/var/www/html/apps/escardar_mail
    environment:
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
      - MYSQL_DATABASE=${NEXTCLOUD_DB_NAME}
      - MYSQL_USER=${NEXTCLOUD_DB_USER}
      - MYSQL_HOST=db
      - NEXTCLOUD_ADMIN_USER=${NEXTCLOUD_ADMIN_USER}
      - NEXTCLOUD_ADMIN_PASSWORD=${NEXTCLOUD_ADMIN_PASSWORD}

  mail:
    image: mailserver/docker-mailserver:latest
    restart: always
    hostname: mail
    domainname: escardar.com
    container_name: escardar_mail
    ports:
      - "25:25"
      - "143:143"
      - "587:587"
      - "993:993"
    volumes:
      - maildata:/var/mail
      - mailstate:/var/mail-state
      - mailconfig:/tmp/docker-mailserver
      - maillogs:/var/log/mail
    environment:
      - TZ=America/Bogota
      - HOSTNAME=mail
      - DOMAINNAME=escardar.com
      - SSL_TYPE=
      - ENABLE_QUOTAS=1
      - ENABLE_MANAGESIEVE=1
      - ENABLE_SIEVE=1
      - SPOOFING_PROTECTION=relaxed
      - PERMIT_DOCKER=host
    networks:
      default:
        aliases:
          - mail.escardar.com

volumes:
  nextcloud_db:
  nextcloud_data:
  maildata:
  mailstate:
  mailconfig:
  maillogs: